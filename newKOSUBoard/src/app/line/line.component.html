<app-data-table #table
[loading]="loading$ | async"
  [data]="lines$ | async"
  [columns]="columns"
  [actions]="actions"
  [pageSize]="5"
  [addButton]="addButton"
  [assignButton]="assignButton">
  <app-text-filter table-filters (filterChange)="table.applyFilter($event)"></app-text-filter>
</app-data-table>
